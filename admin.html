<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thanh Minh Các - Hệ Thống Quản Trị Chủ Shop</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700;900&family=Quicksand:wght@400;500;600;700&display=swap">
</head>
<body class="admin-page" style="background: #1a0a2e; color: #f0e6ff; font-family: 'Quicksand', sans-serif; padding-bottom: 60px;">

  <div id="notification" class="notification" style="position:fixed; top:20px; right:20px; z-index:9999; padding:12px 24px; border-radius:8px; display:none;"></div>

  <header id="header" style="background: rgba(20, 10, 35, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); padding: 15px 0;">
    <div class="header-inner" style="max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px;">
      <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer;">
        <span style="display:block; font-family:'Exo 2',sans-serif; font-weight:900; font-size:1.6rem; background:linear-gradient(45deg, #ff6b9d, #c44dff); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">THANH MINH CÁC</span>
        <span style="font-size:0.75rem; color:#ffd700; letter-spacing:2px; display:block; margin-top:2px;">👑 HỆ THỐNG QUẢN TRỊ PANEL</span>
      </div>
      <div class="header-actions">
        <button class="btn" onclick="window.location.href='index.html'" style="background:rgba(255,255,255,0.1); color:#fff; border:1px solid rgba(255,255,255,0.2); padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:bold; transition:all 0.3s;">🏠 Về Trang Chủ</button>
      </div>
    </div>
  </header>

  <main class="admin-container" style="padding: 40px 20px; max-width: 1200px; margin: 0 auto;">
    <div style="background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 30px; box-shadow: 0 8px 32px rgba(0,0,0,0.3);">
      <h2 style="font-family:'Exo 2',sans-serif; margin-bottom:25px; color:#ff9de2; font-size:1.8rem; border-bottom:2px solid rgba(255,255,255,0.1); padding-bottom:10px; display:flex; align-items:center; gap:10px;">
        📋 Danh Sách Đơn Hàng Cày Thuê Cần Duyệt
      </h2>
      
      <div id="adminOrderList" class="admin-order-list" style="display: grid; grid-template-columns: 1fr; gap: 20px;">
        <div style="text-align:center; padding:40px; opacity:0.5;">Đang kết nối thần thức với dữ liệu Firebase...</div>
      </div>
    </div>
  </main>

  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="admin.js"></script>

  <script>
    // Hàm phụ trợ hiển thị thông báo nhanh cho trang admin
    window.showNotif = function(msg, type = "info") {
      const notif = document.getElementById("notification");
      if (!notif) return;
      notif.innerText = msg;
      notif.style.display = "block";
      if(type === 'success') notif.style.background = '#4ade80';
      if(type === 'error') notif.style.background = '#f87171';
      if(type === 'info') notif.style.background = '#60a5fa';
      notif.style.color = '#fff';
      setTimeout(() => { notif.style.display = "none"; }, 4000);
    };
    <script type="module" src="firebase-config.js"></script>
<script type="module" src="admin.js"></script>
  </script>
</body>
</html>
